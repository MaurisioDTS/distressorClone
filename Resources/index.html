<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>distressorClone</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="plugin">
        <header class="top-bar">
            <span class="brand">distressor<span class="accent">Clone</span></span>
            <span class="subtitle">EL8 de patranya clon de Empirical Labs</span>
        </header>

        <main class="body">
            <section class="panel panel-controls">
                <h3 class="panel-title">Controls</h3>

                <div class="lcd lcd-strip" id="controlsDisplay">
                    <div class="lcd-section" data-section="distortionMode">
                        <!-- <span class="lcd-label">Distortion</span> -->
                        <span class="lcd-value">--</span>
                    </div>
                    <div class="lcd-divider"></div>
                    <div class="lcd-section" data-section="ratio">
                        <!-- <span class="lcd-label">Ratio</span> -->
                        <span class="lcd-value">
                            <span class="lcd-number">--</span><span class="lcd-unit">:1</span>
                        </span>
                    </div>
                    <div class="lcd-divider"></div>
                    <div class="lcd-section" data-section="mode">
                        <!-- <span class="lcd-label">Detection</span> -->
                        <span class="lcd-value">--</span>
                    </div>
                </div>

                <div class="cycle-row">
                    <button class="pill-btn cycle-btn" id="distortionCycleBtn" type="button">Distortion</button>
                    <button class="pill-btn cycle-btn" id="ratioCycleBtn"      type="button">Ratio</button>
                    <button class="pill-btn cycle-btn" id="modeCycleBtn"       type="button">Detection</button>
                </div>
            </section>

            <section class="panel panel-knobs">
                <h3 class="panel-title">Knobs</h3>
                <div class="knob-grid">
                    <div class="knob-cell">
                        <div class="knob" data-slider="inputGain" data-unit="dB"></div>
                        <span class="knob-label">Input</span>
                    </div>
                    <div class="knob-cell">
                        <div class="knob" data-slider="outputGain" data-unit="dB"></div>
                        <span class="knob-label">Output</span>
                    </div>
                    <div class="knob-cell">
                        <div class="knob" data-slider="attack" data-unit="ms"></div>
                        <span class="knob-label">Attack</span>
                    </div>
                    <div class="knob-cell">
                        <div class="knob" data-slider="release" data-unit="ms"></div>
                        <span class="knob-label">Release</span>
                    </div>
                </div>
            </section>
        </main>

        <section class="panel panel-meters">
            <h3 class="panel-title">Meters</h3>
            <div class="meters-grid">
                <div class="meter-block">
                    <span class="meter-label">In L</span>
                    <div class="meter" data-meter="inL"><div class="meter-fill"></div></div>
                </div>
                <div class="meter-block">
                    <span class="meter-label">In R</span>
                    <div class="meter" data-meter="inR"><div class="meter-fill"></div></div>
                </div>
                <div class="meter-block meter-gr">
                    <span class="meter-label">GR</span>
                    <div class="meter meter-down" data-meter="gr"><div class="meter-fill"></div></div>
                </div>
                <div class="meter-block">
                    <span class="meter-label">Out L</span>
                    <div class="meter" data-meter="outL"><div class="meter-fill"></div></div>
                </div>
                <div class="meter-block">
                    <span class="meter-label">Out R</span>
                    <div class="meter" data-meter="outR"><div class="meter-fill"></div></div>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
